<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Los Galanes</title>
<link href="https://fonts.googleapis.com/css2?family=Lobster&display=swap" rel="stylesheet">
<style>
/* --- CONFIGURACIÓN BASE --- */
body { margin:0; padding:0; font-family: Arial, sans-serif; background-color: #fcfcfc; color: #000; overflow-x: hidden; }
.container { max-width:600px; width:100%; margin:0 auto; padding:15px; box-sizing:border-box; text-align:center; display: flex; flex-direction: column; align-items: center; }
#logo { font-family:'Lobster', cursive; font-size:120px; color:#000; margin-bottom:20px; text-shadow: 8px 8px 15px rgba(0,0,0,0.8); line-height: 1; visibility: hidden; }
#msg-cerrado { display: none; font-family: 'Arial', sans-serif; font-size: 30px; font-weight: bold; color: #000; background-color: #FCF021; border: 2px solid #000; border-radius: 10px; padding: 30px; margin: 40px 10px; text-transform: uppercase; }
.header-pedido { width: 100%; display: flex; justify-content: flex-start; }
.btn-salir { background-color: #000; color: #FFF; font-size: 10px; border-radius: 10px; padding: 10px 20px; border: none; cursor: pointer; text-transform: uppercase; margin-bottom: 20px; }
#titulo-display { font-family: 'Lobster', cursive; font-size: 50px; color: #FFF; -webkit-text-stroke: 1px #000; margin: 15px 0; line-height: 1.1; }

.idiomas-box { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; margin: 15px 0; }
.icon-idioma { font-size: 30px; cursor: pointer; filter: grayscale(100%); transition: 0.3s; text-shadow: 3px 3px 6px rgba(0,0,0,0.5); }
.icon-idioma.active { filter: grayscale(0%); }

.opciones-container { width: 100%; text-align: left; margin: 20px 0; }
.opcion-check { font-family: Arial; font-size: 20px; color: #000; display: flex; align-items: center; justify-content: flex-start; margin: 10px 0; cursor: pointer; }
.opcion-check input { margin-right: 15px; transform: scale(1.3); }
.cat-header { background: #000; color: #FFF; font-size: 30px; padding: 12px; margin: 25px 0 10px 0; border-radius: 10px; text-transform: uppercase; width: 100%; box-sizing: border-box; }

/* --- PRODUCTOS --- */
.card-prod { border-bottom: 1px solid #ddd; padding: 8px 0; width: 100%; display: flex; justify-content: space-between; align-items: center; }
.prod-info { text-align: left; flex: 1; padding-right: 10px; display: flex; flex-direction: column; align-items: flex-start; gap: 4px; }
.prod-nombre { font-weight: bold; font-size: 22px; color: #000; line-height: 1.1; }
.btn-info { background-color: #6c757d; color: white; border: none; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
.prod-desc, .prod-alergenos-preview { display: none; }
.prod-control-derecha { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; min-width: 145px; }
.prod-precio { font-weight: bold; font-size: 22px; color: #000; margin-bottom: 2px; }
.controles { display: flex; align-items: center; height: 45px; }
.btn-cant { width: 45px; height: 45px; background: #FFF; border: 2px solid #000; color: #000; font-size: 25px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; box-sizing: border-box; }
.btn-izq { border-radius: 10px 0 0 10px; border-right: none; }
.btn-der { border-radius: 0 10px 10px 0; border-left: none; }
.display-cant { width: 50px; height: 45px; background: #FCF021; border: 2px solid #000; color: #000; font-size: 25px; font-weight: bold; display: flex; align-items: center; justify-content: center; box-sizing: border-box; }

/* --- VENTANAS FLOTANTES --- */
.modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; }
.modal-box { background: #FFF; border: 4px solid #000; border-radius: 20px; width: 95%; max-width: 550px; padding: 30px; box-sizing: border-box; text-align: center; max-height: 90vh; overflow-y: auto; position: relative; }
.modal-close-x { position: absolute; top: 15px; right: 20px; font-size: 35px; font-weight: bold; color: #000; cursor: pointer; line-height: 1; z-index: 10; }
.img-detalle { width: 100%; max-height: 300px; object-fit: cover; border-radius: 10px; border: 2px solid #000; margin-bottom: 20px; }
.alergenos-detalle { font-size: 45px; background: #f0f0f0; padding: 15px; border-radius: 10px; margin: 20px 0; display: block; }
.alergenos-label-interna { display: block; font-family: Arial; font-size: 14px; color: #555; text-align: center; margin-bottom: 8px; text-transform: uppercase; font-weight: bold; }
.modal-head-lobster { font-family: 'Lobster', cursive; font-size: 50px; color: #000000; margin-bottom: 25px; line-height: 1; text-align: center; padding-right: 20px; }
.modal-dato-arial-20 { font-family: Arial; font-size: 20px; color: #000000; text-align: left; margin: 5px 0; line-height: 1.2; }

/* --- ESTILOS SALSAS --- */
.aviso-salsas-modal { background: #f0f7ff; border-left: 4px solid #000; padding: 10px; margin-bottom: 15px; font-family: Arial, sans-serif; font-size: 16px; color: #333; text-align: left; }
.contenedor-botones-salsas { display: flex; flex-direction: column; gap: 10px; }
.btn-salsa-vertical { width: 100%; padding: 15px; font-family: 'Arial', sans-serif; font-size: 18px; font-weight: bold; text-transform: uppercase; background-color: #ffffff; border: 2px solid #000000; border-radius: 8px; cursor: pointer; transition: background 0.2s; }
.btn-salsa-vertical:active { background-color: #f0f0f0; transform: scale(0.98); }

.total-box { background: #FFF; border: 2px solid #000; border-radius: 10px; font-weight: bold; font-size: 40px; padding: 15px; margin: 25px 0; width: 100%; box-sizing: border-box; }
.btn-revisar { background: #FFF; border: 4px solid #000; border-radius: 15px; font-family: Arial; font-weight: bold; font-size: 25px; color: #000; width: 100%; padding: 15px; cursor: pointer; margin-top: 20px; text-transform: uppercase; }

.modal-producto-item { font-family: Arial; font-size: 18px; color: #000000; text-align: left; margin: 5px 0; line-height: 1.2; text-transform: uppercase; }
.modal-total-50-center { font-family: Arial; font-weight: bold; font-size: 50px; color: #000000; text-align: center; margin: 25px 0; text-transform: uppercase; }
.linea-1px-continua { border-top: 1px solid #000; margin: 15px 0; width: 100%; }
.rev-obs-box { border: 1px solid #000000; border-radius: 10px; padding: 15px; font-family: Arial; font-size: 20px; color: #000000; text-align: left; margin: 15px 0; text-transform: uppercase; }
.btn-modal-pago { background: #000; color: #FFF; border-radius: 10px; padding: 18px; font-family: Arial; font-weight: bold; font-size: 20px; cursor: pointer; text-transform: uppercase; width: 100%; border: none; margin-top: 15px; }
.btn-modal-modificar { background: #FFF; color: #000; border: 2px solid #000; border-radius: 10px; padding: 15px; font-family: Arial; font-weight: bold; font-size: 18px; cursor: pointer; text-transform: uppercase; width: 100%; margin-top: 10px; }
.head-alerta-lobster { font-family: 'Lobster', cursive; font-size: 50px; color: #000; margin-bottom: 20px; }
.txt-alerta-arial-25 { font-family: Arial; font-size: 25px; color: #000; margin-bottom: 20px; }
.btn-modal-ok-grande { background: #000; color: #FFF; border-radius: 10px; padding: 15px; font-family: Arial; font-weight: bold; font-size: 50px; cursor: pointer; text-transform: uppercase; width: 100%; border: none; }

/* --- ENTRADAS CORREGIDAS PARA AMARILLO PERMANENTE --- */
.input-custom { background: #FCF021 !important; border: 2px solid #000; border-radius: 10px; font-family: Arial; color: #000; width: 100%; box-sizing: border-box; padding: 12px; margin: 15px 0; outline: none; }
.input-custom:focus { background: #FCF021 !important; outline: none; }
#obs { font-size: 40px; }
#nombre-cliente, #dir-cliente { font-size: 30px; }

.caja-tel-cliente { background: #FCF021 !important; border: 2px solid #000; border-radius: 10px; width: 100%; box-sizing: border-box; padding: 15px; margin-top: 10px; }
.tel-input-final { width: 100%; background: transparent !important; border: none; font-family: Arial; font-size: 30px; color: #000; outline: none; }
.tel-input-final:focus { background: transparent !important; outline: none; }

/* Evitar el color celeste automático de Chrome (Autofill) */
input:-webkit-autofill,
input:-webkit-autofill:hover, 
input:-webkit-autofill:focus,
textarea:-webkit-autofill,
textarea:-webkit-autofill:hover,
textarea:-webkit-autofill:focus {
  -webkit-box-shadow: 0 0 0px 1000px #FCF021 inset !important;
  -webkit-text-fill-color: #000 !important;
  transition: background-color 5000s ease-in-out 0s;
}

footer { width: 100%; text-align: center; padding: 20px 0; }
.copyright { font-size: 10px; color: #000; }
#vista-pedido, #secciones, #pantalla-abierto { width: 100%; display: none; }
.opcion-deshabilitada { opacity: 0.3; filter: grayscale(100%); pointer-events: none; cursor: not-allowed; }
</style>
</head>
<body>

<div class="container">
  <div id="logo">LOS GALANES</div>
  <div id="idiomas-main" class="idiomas-box"></div>
  <div id="msg-cerrado"></div>

  <div id="pantalla-abierto">
    <div id="secciones" style="display:flex; flex-direction:column; gap:15px; margin-bottom: 20px;"></div>
    <div id="frase_bienvenida" style="font-size:30px; font-weight:bold; margin:20px 0;"></div>
  </div>

  <div id="vista-pedido">
    <div class="header-pedido">
      <button class="btn-salir" id="btn-salir-txt" onclick="irAInicio()"></button>
    </div>
    <div id="titulo-display"></div>
    <div id="frase-sec-txt"></div>

    <div class="opciones-container" id="container-modalidad">
      <label class="opcion-check" id="opt-tomar"><input type="radio" name="modalidad" value="LOCAL" onchange="toggleDireccion()"> <span id="txt_tomar"></span></label>
      <label class="opcion-check" id="opt-llevar"><input type="radio" name="modalidad" value="LLEVAR" onchange="toggleDireccion()"> <span id="txt_llevar"></span></label>
      <label class="opcion-check" id="opt-envio">
        <input type="radio" name="modalidad" value="ENVIO" onchange="toggleDireccion()"> <span id="txt_envio"></span>
        <span id="txt_rider" style="margin-left:10px;"></span>
      </label>
    </div>

    <div id="lista-prods"></div>
    <input type="text" id="obs" class="input-custom" oninput="this.value = this.value.toUpperCase()">
    <div class="total-box"><span id="lbl_total">TOTAL</span>: <span id="total-val">0</span> €</div>

    <div class="opciones-container">
      <label class="opcion-check" id="opt-pago-efectivo"><input type="radio" name="pago" value="EFECTIVO"> <span id="txt_efectivo"></span></label>
      <label class="opcion-check"><input type="radio" name="pago" value="TARJETA"> <span id="txt_tarjeta"></span></label>
      <label class="opcion-check"><input type="radio" name="pago" value="BIZUM"> <span id="txt_bizum"></span></label>
    </div>

    <input type="text" id="nombre-cliente" class="input-custom" oninput="this.value = this.value.toUpperCase()">

    <div class="contenedor-contacto" style="width:100%; margin:20px 0; text-align:left;">
      <label class="opcion-check"><input type="radio" name="pref" value="+34" checked> +34 🇪🇸</label>
      <label class="opcion-check"><input type="radio" name="pref" value="OTRO"> <span id="txt_prefijo"></span></label>
      <div class="caja-tel-cliente">
        <input type="tel" id="tel-cliente" class="tel-input-final">
      </div>
    </div>

    <input type="text" id="dir-cliente" class="input-custom" style="display:none;" oninput="this.value = this.value.toUpperCase()">
    <button class="btn-revisar" id="btn_revisar_comanda" onclick="validarYRevisar()"></button>
  </div>
</div>

<div id="modal-container" class="modal-overlay">
  <div class="modal-box" id="modal-content"></div>
</div>

<footer><div id="copyright" class="copyright"></div></footer>

<script>
// 1. CONFIGURACIÓN Y VARIABLES GLOBALES
const URL_GAS = "https://script.google.com/macros/s/AKfycbxSnZMQP9AxOyUpkLJYo1HD10yK1M96o8m5C5KzHGwR6HubEH8mZxydBcOKGkITsYUVPQ/exec";

let datosWeb = null;
let lang = 'SP'; 
let pedido = {};
let seccionActual = null;
let lastRes = null;
let cacheProductos = {}; // Nueva caché para evitar esperas

// 2. EVENTO DE CARGA ÚNICO
document.addEventListener("DOMContentLoaded", async () => {
  try {
    const urlLlamada = `${URL_GAS}?v=get_datos_web&t=${new Date().getTime()}`;
    const res = await fetch(urlLlamada);
    if (!res.ok) throw new Error("Error en la respuesta");
    const data = await res.json();
    init(data);
    
    // OPTIMIZACIÓN: Precargar todas las secciones operativas en segundo plano
    precargarTodo(data.secciones);
    
  } catch (e) { 
    console.error("Error:", e);
    alert("Error de conexión con el servidor de datos.");
  }
});

async function precargarTodo(secciones) {
  secciones.forEach(async (sec) => {
    if (sec.OPERATIVA.toUpperCase() === "SI") {
      try {
        const url = `${URL_GAS}?v=get_datos_seccion&seccion=${encodeURIComponent(sec.NOMBRE_DEFAULT)}&t=${new Date().getTime()}`;
        const res = await fetch(url);
        cacheProductos[sec.NOMBRE_DEFAULT] = await res.json();
        console.log("Precargada sección:", sec.NOMBRE_DEFAULT);
      } catch (e) { console.warn("Error precargando", sec.NOMBRE_DEFAULT); }
    }
  });
}

function init(datos) {
  if (!datos || datos.error) return;
  datosWeb = datos;
  
  // Guardamos el menú completo para que abrirSeccion no tenga que buscar nada fuera
  if (datos.menuCompleto) {
    cacheProductos = datos.menuCompleto;
  }

  const logoEl = document.getElementById("logo");
  logoEl.textContent = datosWeb.config.NOMBRE || "LOS GALANES";
  logoEl.style.visibility = "visible";
  crearIdiomas();
  
  let idio = (datosWeb.config && datosWeb.config.IDIOMA_POR_DEFECTO) ? datosWeb.config.IDIOMA_POR_DEFECTO : "SP";
  cambiarIdioma(idio); 
  
  const estado = (datosWeb.config.ESTADO_BAR || "").toString().toUpperCase().trim();
  if (estado !== "ABIERTO") {
    const msg = getTrad(datosWeb.config.SI_CERRADO);
    document.getElementById("msg-cerrado").textContent = msg;
    document.getElementById("msg-cerrado").style.display = "block";
    document.getElementById("pantalla-abierto").style.display = "none";
  } else {
    document.getElementById("msg-cerrado").style.display = "none";
    document.getElementById("pantalla-abierto").style.display = "block";
  }
}

function formatearPrecio(v) { 
  let n = parseFloat(v); 
  return isNaN(n) ? "0" : (n % 1 === 0 ? n.toString() : n.toFixed(2)); 
}

function crearIdiomas(){
  const flags = ['SP','EN','FR','IT','PT','AL'].map(l => `<span class="icon-idioma" id="flag-${l}" onclick="cambiarIdioma('${l}')">${getFlag(l)}</span>`).join('');
  document.getElementById("idiomas-main").innerHTML = flags;
}

function getFlag(l){ 
  const f = {SP:'🇪🇸',EN:'🇬🇧',FR:'🇫🇷',IT:'🇮🇹',PT:'🇵🇹',AL:'🇩🇪'}; 
  return f[l]; 
}

function cambiarIdioma(nuevo) {
  lang = nuevo;
  document.querySelectorAll('.icon-idioma').forEach(f => f.id.includes(lang) ? f.classList.add('active') : f.classList.remove('active'));
  
  const trads = {
    "btn-salir-txt": "BTN_SALIR_TXT",
    "frase_bienvenida": "MSG_BIENVENIDA",
    "txt_tomar": "PARA_TOMAR",
    "txt_llevar": "PARA_LLEVAR",
    "txt_envio": "ENVIO",
    "lbl_total": "TOTAL",
    "txt_efectivo": "EFECTIVO",
    "txt_tarjeta": "TARJETA",
    "txt_bizum": "BIZUM",
    "txt_prefijo": "TXT_PREFIJO",
    "btn_revisar_comanda": "BTN_REVISAR_COMANDA"
  };

  for (let id in trads) {
    const el = document.getElementById(id);
    if(el) el.textContent = getTrad(trads[id]);
  }

  document.getElementById("obs").placeholder = getTrad("TXT_OBS");
  document.getElementById("nombre-cliente").placeholder = getTrad("TXT_NOMBRE");
  document.getElementById("tel-cliente").placeholder = getTrad("TXT_TELEFONO");
  document.getElementById("dir-cliente").placeholder = getTrad("TXT_DIRECCION");
  
  document.getElementById("txt_rider").textContent = "+" + formatearPrecio(datosWeb.config.RIDER_PRECIO || 0) + " €";
  document.getElementById("copyright").textContent = (datosWeb.config.NOMBRE || "LOS GALANES") + " © " + getTrad("MSG_COPYRIGHT");

  renderSecciones();
  if(seccionActual) abrirSeccion(seccionActual.config);
}

function getTrad(c, col) {
  if (!datosWeb || !datosWeb.diccionario || !c) return c;
  const entrada = datosWeb.diccionario[c.toString().toUpperCase().trim()];
  if (entrada) { 
    let cod = (col === 1 || lang === 'SP') ? 'ES' : lang;
    return entrada[cod] || entrada['ES'] || c; 
  }
  return c;
}

function normalizarClave(t) { 
  return "SEC_" + String(t).toUpperCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g, ""); 
}

function renderSecciones() {
  const cont = document.getElementById("secciones");
  cont.innerHTML = "";
  datosWeb.secciones.forEach(sec => {
    if (sec.OPERATIVA.toUpperCase() === "SI") {
      const btn = document.createElement("button");
      btn.style.cssText = "font-size:24px; font-weight:bold; padding:18px; background-color:#FCF021; border:2px solid #000; border-radius:10px; cursor:pointer; width:100%; margin-bottom:10px;";
      btn.textContent = getTrad(normalizarClave(sec.NOMBRE_DEFAULT));
      btn.onclick = () => abrirSeccion(sec);
      cont.appendChild(btn);
    }
  });
}

function abrirSeccion(sec) {
  let n = sec.NOMBRE_DEFAULT;
  seccionActual = { nombre: n, claveTrad: normalizarClave(n), config: sec };
  
  document.getElementById("pantalla-abierto").style.display = "none";
  document.getElementById("vista-pedido").style.display = "block";
  document.getElementById("titulo-display").textContent = getTrad(seccionActual.claveTrad);
  
  const tf = getTrad(sec.FRASE_SECCION);
  const elFrase = document.getElementById("frase-sec-txt");
  elFrase.textContent = tf || "";
  elFrase.style.display = tf ? "inline-block" : "none";

  const mods = ["opt-tomar", "opt-llevar", "opt-envio"];
  const ops = [sec.PARA_TOMAR, sec.PARA_LLEVAR, sec.ENVIO];

  mods.forEach((id, i) => {
    const el = document.getElementById(id);
    const radio = el.querySelector('input');
    if (ops[i] === "SI") {
      el.classList.remove("opcion-deshabilitada"); radio.disabled = false;
    } else {
      el.classList.add("opcion-deshabilitada"); radio.disabled = true; radio.checked = false;
    }
  });

  // CARGA INSTANTÁNEA: Usamos los productos que ya tenemos en cacheProductos
  if (cacheProductos && cacheProductos[n]) {
    lastRes = { 
      orden: [n], 
      productosPorCategoria: { [n]: cacheProductos[n] } 
    };
    renderProductos(lastRes);
  } else {
    document.getElementById("lista-prods").innerHTML = '<div style="margin-top:20px;">No hay productos en esta sección.</div>';
  }
}

function renderProductos(res) {
  const cont = document.getElementById("lista-prods"); 
  cont.innerHTML = "";
  const mod = document.querySelector('input[name="modalidad"]:checked')?.value || "LOCAL";
  const textoInfo = getTrad("INFO");

  if (!res || !res.orden) return;

  res.orden.forEach(cat => {
    let html = "";
    const productosDeCategoria = res.productosPorCategoria[cat] || [];
    
    productosDeCategoria.forEach(p => {
      if (p.soloLocal && mod !== "LOCAL") return;

      // Aseguramos que el ID sea un string limpio
      const pID = String(p.id).trim();
      let cant = 0;
      
      // Buscamos cantidad en el carrito
      for(let k in pedido) { 
        if(String(pedido[k].id) === pID) cant += pedido[k].cant; 
      }

      const pJson = JSON.stringify(p).replace(/'/g, "&apos;").replace(/"/g, "&quot;");

      html += `
      <div class="card-prod">
        <div class="prod-info">
          <span class="prod-nombre">${getTrad(p.nombre)}</span>
          <button class="btn-info" onclick='verDetalleProducto(${pJson})'>${textoInfo}</button>
        </div>
        <div class="prod-control-derecha">
          <div class="prod-precio">${formatearPrecio(p.precio)} €</div>
          <div class="controles">
            <button class="btn-cant btn-izq" onclick="updateCant('${pID}', -1)">-</button>
            <div class="display-cant" id="cant-${pID}">${cant > 0 ? cant : ""}</div>
            <button class="btn-cant btn-der" onclick="updateCant('${pID}', 1)">+</button>
          </div>
        </div>
      </div>`;
    });
    if (html) cont.innerHTML += `<div class="cat-header">${getTrad("CAT_"+cat.toUpperCase())}</div>` + html;
  });
}

function updateCant(id, delta) {
  // Limpiamos el ID recibido por si acaso (minúsculas y solo letras/números)
  const idLimpio = String(id).toLowerCase().replace(/[^a-z0-9]/g, '');
  
  // Buscamos en datosWeb usando la misma lógica de limpieza
  const p = datosWeb.productos.find(item => 
    String(item.id).toLowerCase().replace(/[^a-z0-9]/g, '') === idLimpio
  );
  
  if (!p) {
    console.error("No se encontró el producto con ID limpiado:", idLimpio);
    return;
  }

  if (delta > 0) {
    const sRaw = String(p.salsas || "").trim();
    if (sRaw && sRaw !== "0" && sRaw !== "" && sRaw !== "undefined") {
      abrirSelectorSalsas(p);
    } else {
      gestionarCarrito(idLimpio, 1, "SIN_SALSA");
    }
  } else {
    // Para restar, buscamos en el pedido por el ID limpio
    let keys = Object.keys(pedido).filter(k => 
      String(pedido[k].id).toLowerCase().replace(/[^a-z0-9]/g, '') === idLimpio
    );
    
    if(keys.length > 1) {
      alert(getTrad("MSG_QUITAR_DESDE_CARRITO") || "Por favor, quita este producto desde el carrito.");
    } else if(keys.length === 1) {
      gestionarCarrito(idLimpio, -1, pedido[keys[0]].salsa_id);
    }
  }
}

function abrirSelectorSalsas(p) {

function gestionarCarrito(id, delta, sID) {
  // Buscamos el producto siempre con el ID normalizado
  const idLimpio = String(id).toLowerCase().replace(/[^a-z0-9]/g, '');
  const p = datosWeb.productos.find(i => 
    String(i.id).toLowerCase().replace(/[^a-z0-9]/g, '') === idLimpio
  );
  
  if (!p) return;
  
  const key = (sID === "SIN_SALSA") ? idLimpio : idLimpio + "_" + sID;

  if (!pedido[key]) {
    if (delta > 0) {
      pedido[key] = { 
        id: idLimpio, 
        nombre: p.nombre, // Aquí guardamos la CLAVE (ej: PROD_001)
        salsa_id: sID, 
        precio: parseFloat(p.precio), 
        cant: 1 
      };
    }
  } else {
    pedido[key].cant += delta;
    if (pedido[key].cant <= 0) delete pedido[key];
  }

  // Actualizar el Total Visual
  let t = 0; 
  for (let k in pedido) t += pedido[k].cant * pedido[k].precio;
  const elTotal = document.getElementById("total-val");
  if(elTotal) elTotal.textContent = formatearPrecio(t);
  
  // Refrescar la lista para que aparezca el número en el botón
  if(lastRes) renderProductos(lastRes);
}

function abrirModal(tipo) {
  const modal = document.getElementById("modal-container");
  const box = document.getElementById("modal-content");
  modal.style.display = "flex";
  box.innerHTML = "";

  if(tipo === 'REVISION') {
    const nombre = document.getElementById("nombre-cliente").value.toUpperCase();
    const pref = document.querySelector('input[name="pref"]:checked').value;
    const tel = document.getElementById("tel-cliente").value.replace(/[^0-9]/g, '');
    const mod = document.querySelector('input[name="modalidad"]:checked').value;
    const dir = document.getElementById("dir-cliente").value.toUpperCase();
    const pago = document.querySelector('input[name="pago"]:checked').value;
    const obs = document.getElementById("obs").value.trim().toUpperCase();

    let html = `<span class="modal-close-x" onclick="cerrarModal()">&times;</span><div class="modal-head-lobster">${datosWeb.config.NOMBRE}</div>`;
    html += `<div class="modal-dato-arial-20">${nombre}</div><div class="modal-dato-arial-20">${(pref==="+34"?"34":"")+tel}</div>`;
    let modoTxt = mod === "ENVIO" ? getTrad("ENVIO") + ": " + dir : (mod === "LLEVAR" ? getTrad("PARA_LLEVAR") : getTrad("PARA_TOMAR"));
    html += `<div class="modal-dato-arial-20"><b>${modoTxt}</b></div><div class="linea-1px-continua"></div>`;
    
    let sub = 0;
    for(let k in pedido) {
      let f = pedido[k].cant * pedido[k].precio; sub += f;
      let s = (pedido[k].salsa_id !== "SIN_SALSA") ? " (" + getTrad(pedido[k].salsa_id) + ")" : "";
      html += `<div class="modal-producto-item" style="display:flex; justify-content:space-between;"><span>${pedido[k].cant}x ${getTrad(pedido[k].nombre)}${s}</span><b>${formatearPrecio(f)}€</b></div>`;
    }

    if(mod === "ENVIO") { 
      const r = parseFloat(datosWeb.config.RIDER_PRECIO || 0); sub += r;
      html += `<div class="modal-producto-item" style="display:flex; justify-content:space-between; font-weight:bold;"><span>RIDER</span><b>${formatearPrecio(r)}€</b></div>`;
    }

    if(obs) html += `<div class="linea-1px-continua"></div><div class="rev-obs-box">${obs}</div>`;
    html += `<div class="modal-total-50-center">${getTrad("TOTAL")} ${formatearPrecio(sub)}€</div>`;
    
    let btnP = pago === "TARJETA" ? "CONFIRMAR_PAGO_TARJETA" : (pago === "BIZUM" ? "CONFIRMAR_PAGO_BIZUM" : "CONFIRMAR_PAGO_EFECTIVO");
    html += `<button class="btn-modal-pago" onclick="confirmarEnvio()">${getTrad(btnP)}</button>`;
    html += `<button class="btn-modal-modificar" onclick="cerrarModal()">${getTrad("MODIFICAR_PEDIDO")}</button>`;
    box.innerHTML = html;

  } else if(tipo === 'ENVIADO') {
    box.innerHTML = `<div style="text-align:center; padding:20px;"><div class="modal-head-lobster" style="color:#000;">${getTrad("PEDIDO_ENVIADO")}</div><button class="btn-modal-ok-grande" onclick="irAInicio()">OK</button></div>`;
  } else if(tipo === 'ENVIANDO') {
    box.innerHTML = `<div class="modal-dato-arial-20" style="text-align:center;">${getTrad("ENVIANDO_PEDIDO")}...</div>`;
  } else {
    box.innerHTML = `<span class="modal-close-x" onclick="cerrarModal()">&times;</span><div class="head-alerta-lobster">${getTrad("ATENCION")}</div><div class="txt-alerta-arial-25">${getTrad(tipo)}</div><button class="btn-modal-pago" onclick="cerrarModal()">OK</button>`;
  }
}

async function confirmarEnvio() {
  abrirModal('ENVIANDO');
  const nom = document.getElementById("nombre-cliente").value.trim().toUpperCase();
  const pref = document.querySelector('input[name="pref"]:checked').value;
  const tel = document.getElementById("tel-cliente").value.trim().replace(/[^0-9]/g, "");
  const mod = document.querySelector('input[name="modalidad"]:checked').value;
  const pago = document.querySelector('input[name="pago"]:checked').value;
  const dir = document.getElementById("dir-cliente").value.trim().toUpperCase();
  const obs = document.getElementById("obs").value.trim().toUpperCase();
  
  let prods = []; let tick = []; let total = 0;

  for (let k in pedido) {
    let i = pedido[k];
    let s = (i.salsa_id !== "SIN_SALSA") ? " (" + getTrad(i.salsa_id, 1).toUpperCase() + ")" : "";
    let nComp = getTrad(i.nombre, 1).toUpperCase() + s;
    prods.push(i.cant + "X " + nComp);
    tick.push({ nombre: nComp, cantidad: i.cant, precio: i.precio });
    total += (i.cant * i.precio);
  }

  if (mod === "ENVIO") total += parseFloat(datosWeb.config.RIDER_PRECIO || 0);

  const payload = { 
    accion: 'guardar_pedido', 
    nombre: nom, 
    telefono: (pref==="+34"?"34":"") + tel, 
    modalidad: mod, 
    metodoPago: pago, 
    direccion: dir, 
    observaciones: obs, 
    total: total, 
    resumenProductos: prods.join("\n"),
    pedidoOriginal: JSON.stringify({ productos: tick }) 
  };

  try {
    await fetch(URL_GAS, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
    setTimeout(() => { 
      pedido = {}; 
      document.getElementById("total-val").textContent = "0"; 
      abrirModal('ENVIADO'); 
    }, 500);
  } catch (e) { 
    console.error(e);
    alert("Error de red"); 
    abrirModal('REVISION'); 
  }
}

function init(datos){
  if(!datos || datos.error) return;
  datosWeb = datos;
  const logoEl = document.getElementById("logo");
  logoEl.textContent = datosWeb.config.NOMBRE || "LOS GALANES";
  logoEl.style.visibility = "visible";
  crearIdiomas();
  
  let idio = (datosWeb.config && datosWeb.config.IDIOMA_POR_DEFECTO) ? datosWeb.config.IDIOMA_POR_DEFECTO : "SP";
  if (idio === "ES") idio = "SP";
  cambiarIdioma(idio); 
  
  const estado = (datosWeb.config.ESTADO_BAR || "").toString().toUpperCase().trim();
  if (estado !== "ABIERTO") {
    const mensajeEstado = getTrad(datosWeb.config.SI_CERRADO);
    document.getElementById("msg-cerrado").textContent = mensajeEstado;
    document.getElementById("msg-cerrado").style.display = "block";
    document.getElementById("pantalla-abierto").style.display = "none";
  } else {
    document.getElementById("msg-cerrado").style.display = "none";
    document.getElementById("pantalla-abierto").style.display = "block";
  }
}

function formatearPrecio(v) { let n = parseFloat(v); return isNaN(n) ? "0" : (n % 1 === 0 ? n.toString() : n.toFixed(2)); }

function crearIdiomas(){
  const flags = ['SP','EN','FR','IT','PT','AL'].map(l => `<span class="icon-idioma" id="flag-${l}" onclick="cambiarIdioma('${l}')">${getFlag(l)}</span>`).join('');
  document.getElementById("idiomas-main").innerHTML = flags;
}
function getFlag(l){ const f = {SP:'🇪🇸',EN:'🇬🇧',FR:'🇫🇷',IT:'🇮🇹',PT:'🇵🇹',AL:'🇩🇪'}; return f[l]; }

function cambiarIdioma(nuevo) {
  lang = nuevo;
  document.querySelectorAll('.icon-idioma').forEach(f => f.id.includes(lang) ? f.classList.add('active') : f.classList.remove('active'));
  document.getElementById("btn-salir-txt").textContent = getTrad("BTN_SALIR_TXT");
  document.getElementById("frase_bienvenida").textContent = getTrad("MSG_BIENVENIDA");
  document.getElementById("txt_tomar").textContent = getTrad("PARA_TOMAR");
  document.getElementById("txt_llevar").textContent = getTrad("PARA_LLEVAR");
  document.getElementById("txt_envio").textContent = getTrad("ENVIO");
  document.getElementById("lbl_total").textContent = getTrad("TOTAL");
  document.getElementById("txt_efectivo").textContent = getTrad("EFECTIVO");
  document.getElementById("txt_tarjeta").textContent = getTrad("TARJETA");
  document.getElementById("txt_bizum").textContent = getTrad("BIZUM");
  document.getElementById("txt_prefijo").textContent = getTrad("TXT_PREFIJO");
  document.getElementById("btn_revisar_comanda").textContent = getTrad("BTN_REVISAR_COMANDA");
  document.getElementById("obs").placeholder = getTrad("TXT_OBS");
  document.getElementById("nombre-cliente").placeholder = getTrad("TXT_NOMBRE");
  document.getElementById("tel-cliente").placeholder = getTrad("TXT_TELEFONO");
  document.getElementById("dir-cliente").placeholder = getTrad("TXT_DIRECCION");
  
  document.getElementById("txt_rider").textContent = "+" + formatearPrecio(datosWeb.config.RIDER_PRECIO || 0) + " €";
  document.getElementById("copyright").textContent = (datosWeb.config.NOMBRE || "LOS GALANES") + " © " + getTrad("MSG_COPYRIGHT");

  renderSecciones();
  if(seccionActual) abrirSeccion(seccionActual.config);
}

function getTrad(c, columnaForzada) {
  if (!datosWeb || !datosWeb.diccionario || !c) return c;
  const entrada = datosWeb.diccionario[c.toString().toUpperCase().trim()];
  if (entrada) { 
    let cod = (columnaForzada === 1 || lang === 'SP') ? 'ES' : lang;
    return entrada[cod] || entrada['ES'] || c; 
  }
  return c;
}

function normalizarClave(t) { return "SEC_" + String(t).toUpperCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g, ""); }

function renderSecciones() {
  const cont = document.getElementById("secciones");
  cont.innerHTML = "";
  datosWeb.secciones.forEach(sec => {
    if (sec.OPERATIVA.toUpperCase() === "SI") {
      const btn = document.createElement("button");
      btn.style.cssText = "font-size:24px; font-weight:bold; padding:18px; background-color:#FCF021; border:2px solid #000; border-radius:10px; cursor:pointer; width:100%;";
      btn.textContent = getTrad(normalizarClave(sec.NOMBRE_DEFAULT));
      btn.onclick = () => abrirSeccion(sec);
      cont.appendChild(btn);
    }
  });
}

async function abrirSeccion(sec) {
  let n = sec.NOMBRE_DEFAULT;
  seccionActual = { nombre: n, claveTrad: normalizarClave(n), fraseClave: sec.FRASE_SECCION, config: sec };
  document.getElementById("pantalla-abierto").style.display = "none";
  document.getElementById("vista-pedido").style.display = "block";
  document.getElementById("titulo-display").textContent = getTrad(seccionActual.claveTrad);
  
  const tf = getTrad(sec.FRASE_SECCION);
  document.getElementById("frase-sec-txt").textContent = tf || "";
  document.getElementById("frase-sec-txt").style.display = tf ? "inline-block" : "none";

  const opciones = [
    { id: "opt-tomar", operativa: sec.PARA_TOMAR === "SI" },
    { id: "opt-llevar", operativa: sec.PARA_LLEVAR === "SI" },
    { id: "opt-envio",  operativa: sec.ENVIO === "SI" }
  ];

  let opcionesActivas = [];
  opciones.forEach(opt => {
    const el = document.getElementById(opt.id);
    const radio = el.querySelector('input');
    radio.checked = false;
    if (opt.operativa) { 
      el.classList.remove("opcion-deshabilitada"); radio.disabled = false; opcionesActivas.push(radio); 
    } else { 
      el.classList.add("opcion-deshabilitada"); radio.disabled = true; 
    }
  });

  if (opcionesActivas.length === 1) { opcionesActivas[0].checked = true; toggleDireccion(); }

  try {
    const urlProductos = `${URL_GAS}?v=get_datos_seccion&seccion=${encodeURIComponent(n)}&t=${new Date().getTime()}`;
    const response = await fetch(urlProductos);
    const res = await response.json();
    lastRes = res; 
    renderProductos(res);
  } catch (error) {
    console.error("Error productos:", error);
  }
}

function renderProductos(res) {
  const cont = document.getElementById("lista-prods"); 
  cont.innerHTML = "";
  const mod = document.querySelector('input[name="modalidad"]:checked')?.value || "LOCAL";
  const textoInfo = getTrad("INFO");

  res.orden.forEach(cat => {
    let html = "";
    (res.productosPorCategoria[cat] || []).forEach(p => {
      if (p.soloLocal && mod !== "LOCAL") return;
      let cantTotal = 0;
      const pID = String(p.id).trim();
      for(let key in pedido) { if(String(pedido[key].id).trim() === pID) cantTotal += pedido[key].cant; }
      const pJson = JSON.stringify(p).replace(/'/g, "&apos;").replace(/"/g, "&quot;");

      html += `
      <div class="card-prod">
        <div class="prod-info">
          <span class="prod-nombre">${getTrad(p.nombre)}</span>
          <button class="btn-info" onclick='verDetalleProducto(${pJson})'>${textoInfo}</button>
        </div>
        <div class="prod-control-derecha">
          <div class="prod-precio">${formatearPrecio(p.precio)} €</div>
          <div class="controles">
            <button class="btn-cant btn-izq" onclick="updateCant('${pID}',-1)">-</button>
            <div class="display-cant" id="cant-${pID}">${cantTotal > 0 ? cantTotal : ""}</div>
            <button class="btn-cant btn-der" onclick="updateCant('${pID}',1)">+</button>
          </div>
        </div>
      </div>`;
    });
    if (html) cont.innerHTML += `<div class="cat-header">${getTrad("CAT_"+cat.toUpperCase())}</div>` + html;
  });
}

function updateCant(id, delta) {
  const p = datosWeb.productos.find(item => String(item.id) === String(id));
  if (!p) return;
  if (delta > 0) {
    const sRaw = String(p.salsas || "").trim();
    if (sRaw !== "" && sRaw !== "0" && sRaw !== "undefined") {
      abrirSelectorSalsas(p);
    } else {
      gestionarCarrito(id, 1, "SIN_SALSA");
    }
  } else {
    let keys = Object.keys(pedido).filter(k => String(pedido[k].id) === String(id));
    if(keys.length > 1) {
      alert(getTrad("MSG_QUITAR_DESDE_CARRITO"));
    } else if(keys.length === 1) {
      gestionarCarrito(id, -1, pedido[keys[0]].salsa_id || "SIN_SALSA");
    }
  }
}

function abrirSelectorSalsas(p) {
  const modal = document.getElementById("modal-container");
  const box = document.getElementById("modal-content");
  modal.style.display = "flex";
  let titulo = p.nota_salsas ? getTrad(p.nota_salsas) : getTrad("SELECCIONA_SALSA");
  let html = `<span class="modal-close-x" onclick="cerrarModal()">&times;</span><div class="modal-head-lobster">${titulo}</div><div class="contenedor-botones-salsas">`;
  const listaSalsas = p.salsas.split(",").map(s => s.trim());
  listaSalsas.forEach(claveSalsa => {
    if (claveSalsa) html += `<button class="btn-salsa-vertical" onclick="confirmarSalsa('${p.id}', '${claveSalsa}')">${getTrad(claveSalsa).toUpperCase()}</button>`;
  });
  html += `</div>`;
  box.innerHTML = html;
}

function confirmarSalsa(id, claveSalsa) { gestionarCarrito(id, 1, claveSalsa); cerrarModal(); }

function gestionarCarrito(id, delta, claveSalsa) {
  const p = datosWeb.productos.find(item => String(item.id).trim() === String(id).trim());
  if(!p) return;
  const sID = (!claveSalsa || claveSalsa === "SIN_SALSA") ? "SIN_SALSA" : claveSalsa;
  const cartKey = (sID === "SIN_SALSA") ? String(id).trim() : String(id).trim() + "_" + sID;
  if (!pedido[cartKey]) {
    if (delta > 0) pedido[cartKey] = { id: String(id).trim(), nombre: p.nombre, salsa_id: sID, precio: parseFloat(p.precio) || 0, cant: 1 };
  } else {
    pedido[cartKey].cant += delta;
    if (pedido[cartKey].cant <= 0) delete pedido[cartKey];
  }
  calcularTotal();
  if(lastRes) renderProductos(lastRes);
}

function verDetalleProducto(p) {
  const modal = document.getElementById("modal-container");
  const box = document.getElementById("modal-content");
  modal.style.display = "flex";
  let html = `<span class="modal-close-x" onclick="cerrarModal()">&times;</span><div class="modal-head-lobster">${getTrad(p.nombre)}</div>`;
  if(p.foto) html += `<img src="${p.foto}" class="img-detalle">`;
  if(p.descripcion) html += `<div class="modal-dato-arial-20" style="text-align:center; margin-bottom:20px;">${getTrad(p.descripcion)}</div>`;
  if(p.alergenos) html += `<div class="alergenos-detalle"><span class="alergenos-label-interna">${getTrad("VER_ALERGENOS")}</span>${p.alergenos}</div>`;
  box.innerHTML = html;
}

function cerrarModal() { document.getElementById("modal-container").style.display = "none"; }

function calcularTotal() {
  let t = 0; for (let k in pedido) t += pedido[k].cant * pedido[k].precio;
  document.getElementById("total-val").textContent = formatearPrecio(t);
}

function toggleDireccion() {
  const m = document.querySelector('input[name="modalidad"]:checked')?.value;
  document.getElementById("dir-cliente").style.display = (m === "ENVIO") ? "block" : "none";
  if(lastRes) renderProductos(lastRes);
}

function irAInicio() { location.reload(); }

function abrirModal(tipo) {
  const modal = document.getElementById("modal-container");
  const box = document.getElementById("modal-content");
  modal.style.display = "flex";
  box.innerHTML = "";

  if(tipo === 'REVISION') {
    const nombre = document.getElementById("nombre-cliente").value.toUpperCase();
    const pref = document.querySelector('input[name="pref"]:checked').value;
    const telLimpio = document.getElementById("tel-cliente").value.replace(/[^0-9]/g, '');
    const modalidad = document.querySelector('input[name="modalidad"]:checked').value;
    const dir = document.getElementById("dir-cliente").value.toUpperCase();
    const pago = document.querySelector('input[name="pago"]:checked').value;
    const obsVal = document.getElementById("obs").value.trim().toUpperCase();

    let html = `<span class="modal-close-x" onclick="cerrarModal()">&times;</span><div class="modal-head-lobster">${datosWeb.config.NOMBRE}</div>`;
    html += `<div class="modal-dato-arial-20">${nombre}</div>`;
    const telDisplay = (pref === "+34") ? "34" + telLimpio : telLimpio;
    html += `<div class="modal-dato-arial-20">${telDisplay}</div>`;
    let modoLabel = modalidad === "ENVIO" ? getTrad("ENVIO") + ": " + dir : (modalidad === "LLEVAR" ? getTrad("PARA_LLEVAR") : getTrad("PARA_TOMAR"));
    html += `<div class="modal-dato-arial-20"><b>${modoLabel}</b></div><div class="linea-1px-continua"></div>`;
    
    let subtotal = 0;
    for(let key in pedido) {
      let fila = pedido[key].cant * pedido[key].precio; subtotal += fila;
      let nSalsa = (pedido[key].salsa_id !== "SIN_SALSA") ? " (" + getTrad(pedido[key].salsa_id) + ")" : "";
      html += `<div class="modal-producto-item" style="display:flex; justify-content:space-between;"><span>${pedido[key].cant}x ${getTrad(pedido[key].nombre)}${nSalsa}</span><b>${formatearPrecio(fila)}€</b></div>`;
    }

    if(modalidad === "ENVIO") { 
      const precioRider = parseFloat(datosWeb.config.RIDER_PRECIO || 0);
      subtotal += precioRider;
      html += `<div class="modal-producto-item" style="display:flex; justify-content:space-between; font-weight:bold; margin-top:5px;"><span>RIDER</span><b>${formatearPrecio(precioRider)}€</b></div>`;
    }

    if(obsVal) html += `<div class="linea-1px-continua"></div><div class="rev-obs-box">${obsVal}</div>`;
    html += `<div class="modal-total-50-center">${getTrad("TOTAL")} ${formatearPrecio(subtotal)}€</div>`;
    
    let clPago = pago === "TARJETA" ? "CONFIRMAR_PAGO_TARJETA" : (pago === "BIZUM" ? "CONFIRMAR_PAGO_BIZUM" : "CONFIRMAR_PAGO_EFECTIVO");
    html += `<button class="btn-modal-pago" onclick="confirmarEnvio()">${getTrad(clPago)}</button>`;
    html += `<button class="btn-modal-modificar" onclick="cerrarModal()">${getTrad("MODIFICAR_PEDIDO")}</button>`;
    box.innerHTML = html;

  } else if(tipo === 'ENVIADO') {
    box.innerHTML = `<div style="text-align: center; padding: 20px;"><div class="modal-head-lobster" style="color: #000000;">${getTrad("PEDIDO_ENVIADO")}</div><button class="btn-modal-ok-grande" onclick="irAInicio()">OK</button></div>`;
  } else if(tipo === 'ENVIANDO') {
    box.innerHTML = `<div class="modal-dato-arial-20" style="text-align:center;">${getTrad("ENVIANDO_PEDIDO")}...</div>`;
  } else {
    box.innerHTML = `<span class="modal-close-x" onclick="cerrarModal()">&times;</span><div class="head-alerta-lobster">${getTrad("ATENCION")}</div><div class="txt-alerta-arial-25">${getTrad(tipo)}</div><button class="btn-modal-pago" onclick="cerrarModal()">OK</button>`;
  }
}

function validarYRevisar() {
  const mod = document.querySelector('input[name="modalidad"]:checked');
  const pago = document.querySelector('input[name="pago"]:checked');
  const nombre = document.getElementById("nombre-cliente").value.trim();
  const tel = document.getElementById("tel-cliente").value.trim();
  if(Object.keys(pedido).length === 0) return;
  if(!mod) { abrirModal('MSG_FALTA_MODO'); return; }
  if(!pago) { abrirModal('MSG_FALTA_PAGO'); return; }
  if(!nombre || !tel) { abrirModal('MSG_FALTA_DATOS'); return; }
  abrirModal('REVISION');
}

async function confirmarEnvio() {
  abrirModal('ENVIANDO');
  const nombre = document.getElementById("nombre-cliente").value.trim().toUpperCase();
  const prefRadio = document.querySelector('input[name="pref"]:checked').value;
  let telLimpio = document.getElementById("tel-cliente").value.trim().replace(/[^0-9]/g, "");
  const modInput = document.querySelector('input[name="modalidad"]:checked').value;
  const pago = document.querySelector('input[name="pago"]:checked').value;
  const direccion = document.getElementById("dir-cliente").value.trim().toUpperCase();
  const obs = document.getElementById("obs").value.trim().toUpperCase();
  
  let productosArr = []; 
  let detallesParaTicket = [];
  let subtotal = 0;

  for (let key in pedido) {
    let item = pedido[key];
    let nSalsa = (item.salsa_id !== "SIN_SALSA") ? " (" + getTrad(item.salsa_id, 1).toUpperCase() + ")" : "";
    let nombreCompleto = getTrad(item.nombre, 1).toUpperCase() + nSalsa;
    productosArr.push(item.cant + "X " + nombreCompleto);
    detallesParaTicket.push({ nombre: nombreCompleto, cantidad: item.cant, precio: item.precio });
    subtotal += (item.cant * item.precio);
  }

  if (modInput === "ENVIO") {
    subtotal += parseFloat(datosWeb.config.RIDER_PRECIO || 0);
  }

  const payload = { 
    accion: 'guardar_pedido', 
    nombre, 
    telefono: (prefRadio==="+34"?"34":"") + telLimpio, 
    modalidad: modInput, 
    metodoPago: pago, 
    direccion, 
    observaciones: obs, 
    total: subtotal, 
    resumenProductos: productosArr.join("\n"),
    pedidoOriginal: JSON.stringify({ productos: detallesParaTicket }) 
  };

  try {
    await fetch(URL_GAS, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
    setTimeout(() => { 
      pedido = {}; 
      document.getElementById("total-val").textContent = "0"; 
      abrirModal('ENVIADO'); 
    }, 500);
  } catch (e) { 
    console.error(e);
    alert("Error de red"); 
    abrirModal('REVISION'); 
  }
}
</script>
