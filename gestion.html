<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GESTIÓN - LOS GALANES</title>
    <link href="https://fonts.googleapis.com/css2?family=Lobster&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Arial', sans-serif; background: #000; color: #fff; margin: 0; padding: 20px; text-align: center; }
        .logo { font-family: 'Lobster', cursive; font-size: 3rem; color: #fff; margin-bottom: 30px; }
        .status-card { background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid #333; margin-bottom: 20px; }
        .status-text { font-size: 1.5rem; font-weight: bold; margin-bottom: 10px; }
        .status-on { color: #23A80D; }
        .status-off { color: #CF0A0A; }
        
        .btn-container { display: flex; flex-direction: column; gap: 15px; max-width: 400px; margin: 0 auto; }
        .btn { padding: 20px; font-size: 1.2rem; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .btn-open { background: #23A80D; color: white; }
        .btn-close { background: #CF0A0A; color: white; }
        .btn-refresh { background: #444; color: white; font-size: 0.9rem; }
        
        .loading { display: none; margin-top: 10px; color: #888; }
    </style>
</head>
<body>

    <div class="logo">Los Galanes</div>

    <div class="status-card">
        <div class="status-text" id="status-display">Cargando estado...</div>
        <div id="last-update" style="font-size: 0.8rem; color: #666;"></div>
    </div>

    <div class="btn-container">
        <button class="btn btn-open" onclick="cambiarEstado('ABIERTO')">Abrir Bar</button>
        <button class="btn btn-close" onclick="cambiarEstado('CERRADO')">Cerrar Bar</button>
        <button class="btn btn-refresh" onclick="obtenerEstado()">Actualizar Info</button>
    </div>

    <div id="msg-loading" class="loading">Procesando cambio en Google Sheets...</div>

<script>
    const URL_GOOGLE = "https://script.google.com/macros/s/AKfycbxZduqvV4z51oj6PVCfV4YkIC9FgNcEL-pLEmJ-pX7l8Ik4TY8vMAjCW8qSYdEP_zMe/exec";

    async function obtenerEstado() {
        try {
            const res = await fetch(URL_GOOGLE);
            const data = await res.json();
            const abierto = data.barAbierto;
            
            const display = document.getElementById('status-display');
            display.innerText = abierto ? "● BAR ABIERTO" : "○ BAR CERRADO";
            display.className = "status-text " + (abierto ? "status-on" : "status-off");
            document.getElementById('last-update').innerText = "Sincronizado: " + new Date().toLocaleTimeString();
        } catch (e) {
            document.getElementById('status-display').innerText = "Error de conexión";
        }
    }

    async function cambiarEstado(nuevo) {
        if(!confirm("¿Confirmas cambiar el estado a " + nuevo + "?")) return;
        
        document.getElementById('msg-loading').style.display = 'block';
        
        const body = {
            accion: 'cambiar_apertura',
            nuevoEstado: nuevo
        };

        try {
            // Usamos mode: 'no-cors' para evitar bloqueos, aunque no podamos leer la respuesta
            await fetch(URL_GOOGLE, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(body)
            });
            
            // Esperamos un segundo y refrescamos
            setTimeout(() => {
                document.getElementById('msg-loading').style.display = 'none';
                obtenerEstado();
            }, 1500);
            
        } catch (e) {
            alert("Error al enviar comando");
            document.getElementById('msg-loading').style.display = 'none';
        }
    }

    window.onload = obtenerEstado;
</script>
</body>
</html>
